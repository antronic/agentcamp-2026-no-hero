<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AI Chat</title>
    <!-- marked.js — lightweight Markdown parser (pinned to v15) -->
    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; }
      textarea { width: 100%; font-size: 1rem; padding: 0.5rem; }
      button { margin-top: 0.5rem; padding: 0.5rem 1.5rem; font-size: 1rem; cursor: pointer; }
      #output {
        margin-top: 1rem;
        padding: 1rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fafafa;
        min-height: 3rem;
        overflow-x: auto;
      }
      #output table { border-collapse: collapse; width: 100%; margin: 0.5rem 0; }
      #output th { border: 1px solid #ccc; padding: 8px 12px; text-align: left; background: #f0f0f0; font-weight: 600; }
      #output td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
      #output tr:hover { background: #f5f5f5; }
      #output pre { background: #f0f0f0; padding: 0.75rem; border-radius: 4px; overflow-x: auto; }
      #output code { background: #f0f0f0; padding: 2px 4px; border-radius: 3px; }
    </style>
  </head>
  <body>
    <h1>AI Chat</h1>

    <textarea id="message" rows="4">Check inventory for product GAD-001 at branch BKK-SILOM</textarea>

    <br />
    <button onclick="sendMessage()">Send</button>

    <div id="output"></div>

    <script>
      async function sendMessage() {
        const output = document.getElementById("output");
        output.innerHTML = "<em>Thinking…</em>";

        const message = document.getElementById("message").value;

        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await res.json();
        // marked.parse with GFM tables explicitly enabled
        output.innerHTML = marked.parse(data.reply || "_(no response)_", { gfm: true, breaks: true });
      }
    </script>
  </body>
</html>
